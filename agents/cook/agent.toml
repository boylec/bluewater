# CS — Culinary Specialist (the "Cook").
#
# Supply department rate. (Real-navy correction in v0.1.0: was
# previously placed under Medical; the rate code is CS, the
# department is Supply, the colloquial role name is "Cook." See
# doctrine/AMENDMENTS.md A0002.)
#
# Cook is deterministic — no LLM session. The scripts/cook-check.sh
# script runs on a 1m cron via the `agent_stalled` order to detect
# stalled / hung / looping agents. The galley analogy: crew morale =
# agent health (you don't ask, you watch). When the alarm fires,
# Corpsman (HM) is dispatched to actually investigate; Cook itself
# stays deterministic. That's the load-bearing cost decision — zero
# token cost while the ship is healthy.
#
# Why the rate is "CS" (Culinary Specialist) but the agent dir is
# "cook": the rate code "CS" collides with the colloquial name for
# the Combat Systems department. Using "cook" as the agent dir name
# avoids that ambiguity.
#
# In plain SE terms: deterministic. Rate code is CS (Culinary
# Specialist). The scripts/cook-check.sh script runs on a 1m cron —
# detects stalled/hung agents and fires man_overboard via agent_stalled
# order. No LLM, no token cost.
#

