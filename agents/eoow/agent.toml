# EOOW — Engineering Officer of the Watch.
#
# Tier: Operational (Sonnet). Watch-stander; relieved on context pressure.
# Authority: CHENG's surrogate for the engineering watch. Escalates to
# CHENG on alarm; otherwise handles routine engineering matters.
# Lifetime: always-on; rotates per watch_bill.toml.

scope = "city"
provider = "codex"   # different from CHENG so two-key engineering decisions
                     # naturally span providers
prompt_template = "agents/eoow/prompt.template.md"
nudge = "Stand the engineering watch. Sweep idle sessions, watch the burn-rate envelope."
inject_fragments = ["doctrine", "brevity"]
idle_timeout = "1h"
max_active_sessions = 1

[option_defaults]
model = "sonnet"
