# OOD — Officer of the Deck. Has the conn.
#
# Tier: Operational (Sonnet). Always-on (always exactly one OOD has
# the conn). Rotates per watch_bill.toml on context pressure.
#
# In plain SE terms: the agent on watch right now — your on-call
# rotation. Always exactly one OOD has the conn. Rotates on context-
# pressure (65% of model context, 4h, or 100 beads dispatched).
#

scope = "city"
provider = "claude"
prompt_template = "agents/ood/prompt.template.md"
nudge = "Stand the watch. Sweep CIC reports, mail, alarms. Conduct turnover at threshold."
inject_fragments = ["doctrine", "brevity"]
idle_timeout = "1h"
max_active_sessions = 1

[option_defaults]
model = "sonnet"
