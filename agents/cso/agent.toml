# CSO — Combat Systems Officer (department head).
#
# Tier: Tactical (Sonnet). On-demand.
#
# In plain SE terms: the merge-pipeline lead. Owns code review
# (pr_review formula), coordinates targeting (FC) and implementation
# (GM) workers, OICs CS-flavored casualties (collision_at_sea,
# fire_in_compartment).
#

scope = "city"
provider = "claude"
prompt_template = "agents/cso/prompt.template.md"
nudge = "Check pr_review queue, in-flight FC targeting, any DC casualties."
inject_fragments = ["doctrine", "brevity"]
idle_timeout = "30m"
max_active_sessions = 1

[option_defaults]
model = "sonnet"
