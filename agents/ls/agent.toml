# SK — Storekeeper.
#
# Tier: Operational (Sonnet). Rated PO.
# Manages credential and dependency inventories under SUPPO.
#
# In plain SE terms: the credentials and dependency-audit specialist.
# Rotates credentials on documented schedules, triages
# Renovate/Dependabot findings, reconciles per-provider credit usage.
# Works only via SUPPO-minted scoped tokens.
#

scope = "rig"
provider = "claude"
prompt_template = "agents/sk/prompt.template.md"
nudge = "Check assigned supply-flavored beads (credential rotations, dependency audits)."
inject_fragments = ["doctrine", "brevity"]
idle_timeout = "2h"
min_active_sessions = 0
max_active_sessions = 2
default_sling_formula = "mol-bluewater-work"

[option_defaults]
model = "sonnet"
