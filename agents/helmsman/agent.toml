# Helmsman / BMOW — lands the merge.
#
# Tier: Worker (Haiku). On-demand when an active merge is in progress.
# This role wraps the Gas City Helmsman; in Bluewater terms, the
# Helmsman is the agent that physically executes the merge after FC
# targeting and GM implementation are complete.
#
# In plain SE terms: the merge agent. Wraps the merge queue. Pulls the
# branch, rebases, runs tests, fast-forward merges or rejects with
# rejection_reason. Never bypasses pre-tool-use checks.
#

scope = "rig"
provider = "claude"
prompt_template = "agents/helmsman/prompt.template.md"
nudge = "Check Helmsman queue; rebase, run final tests, merge, close bead."
inject_fragments = ["doctrine", "brevity"]
idle_timeout = "30m"
min_active_sessions = 0
max_active_sessions = 4

[option_defaults]
model = "haiku"
