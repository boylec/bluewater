# Corpsman — agent intervention.
#
# Tier: Operational (Sonnet). On-demand.
#
# In plain SE terms: the agent-intervention specialist. Triage agents
# that have stalled, hung, or started looping. Pick one intervention
# (nudge, drain, seance handoff, captains_mast) and commit. Don't fix
# the bead — fix the agent.
#

scope = "city"
provider = "claude"
prompt_template = "agents/corpsman/prompt.template.md"
nudge = "Investigate the stalled agent. Decide: nudge, drain, or recover via seance handoff."
inject_fragments = ["doctrine", "brevity"]
idle_timeout = "30m"
max_active_sessions = 1

[option_defaults]
model = "sonnet"
