# provider_outage — fires `loss_of_propulsion` casualty.
#
# In plain SE terms: detects when an LLM provider (claude/codex/gemini)
# is failing for the ship as a whole — not just one occasional
# timeout, but a persistent pattern. Triggers the loss_of_propulsion
# response which decides fight-through, fall-back, or fail-over.
#
# Battle Bill wiring: loss_of_propulsion's OIC is CHENG. Formula at
# formulas/loss_of_propulsion.toml.
#
# Telemetry plumbing: reads bluewater.provider.error events. See
# docs/install.mdx "Telemetry plumbing" to wire real signal.

[order]
description = "Detect provider-wide outage from recent error events; sound loss_of_propulsion casualty."
trigger = "condition"
check = "scripts/check-provider-health.sh"
formula = "loss_of_propulsion"
pool = "suppo"
interval = "2m"
timeout = "30s"
enabled = true
