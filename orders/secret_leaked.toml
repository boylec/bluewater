# secret_leaked — fires `radiation_leak` casualty.
#
# In plain SE terms: fires radiation_leak when a deterministic scan
# detects a secret in code, log, or bead body.
#
[order]
description = "Detect secret/sensitive-data exposure via deterministic scan; sound radiation_leak."
trigger = "event"
on = "scan.secret_detected"
formula = "radiation_leak"
pool = "maa"
timeout = "30s"
enabled = true
