# Bluewater watchstation bindings — maps each named watchstation in
# battle_bill.toml to a rating + count + required flag.
#
# When a formula dispatches, the dispatcher reads battle_bill.toml, looks
# up each watchstation here, and spawns or assigns agents accordingly. If a
# `required = true` watchstation cannot be filled (rating not available,
# budget exhausted, all candidates context-saturated), the dispatcher
# SHALL escalate to the OIC of the evolution before proceeding.
#
# The acceptance suite includes a linter that validates: every watchstation
# referenced in any formula has a binding here, and every binding's rating
# corresponds to an actual `agents/<rating>/agent.toml` somewhere in the
# composed pack tree. The linter SHALL pass before tagging a release.
#
# Real-navy rate codes are used throughout (see doctrine/AMENDMENTS.md
# A0002): MA (Master-at-Arms), YN (Yeoman), HM (Hospital Corpsman), LS
# (Logistics Specialist, formerly SK).

# ---------------------------------------------------------------------------
# Wardroom (umbrella)
# ---------------------------------------------------------------------------

[watchstation.co]
rating = "co"
count = 1
required = true

[watchstation.xo]
rating = "xo"
count = 1
required = true

[watchstation.ood]
rating = "ood"
count = 1
required = true

[watchstation.cob]
rating = "cob"
count = 1
required = true

[watchstation.csoow]
rating = "csoow"
count = 1
required = true   # required at General Quarters and above

