# ---------------------------------------------------------------------------
# Special-purpose (board pass-throughs)
# ---------------------------------------------------------------------------

# An adversarial_reviewer is any rated agent of an *appropriate* rate
# running on a *different model provider* than the OIC of the evolution
# (per ARCHITECTURE.md, "Two-key launch with cross-provider concurrence").
# The dispatcher resolves this at runtime by selecting from the available
# pool with provider != OIC.provider.
[watchstation.adversarial_reviewer]
rating = "any_rated"
count = 1
required = true
constraint = "different_provider_than_oic"

# rated_po_in_target_rate is filled by any rated PO whose rating matches
# the target rate of the rating board being convened.
[watchstation.rated_po_in_target_rate]
rating = "rated_po"
count = 1
required = true
constraint = "rate_matches_target"

# Discord adapter
[watchstation.quarterdeck_watch]
rating = "quarterdeck_watch"
count = 1
required = false

# Lookouts and Sonar — deterministic, no LLM until alarm
[watchstation.lookouts]
rating = "lookout"
count = { min = 0, max = 4 }
required = false
deterministic = true

[watchstation.sonar]
rating = "sonar"
count = { min = 0, max = 2 }
required = false
deterministic = true
