# Bluewater Battle Bill — routing table for evolutions and casualties.
#
# Per doctrine/BATTLE_BILL.md. Formulas SHALL NOT hard-code role
# assignments that exist here; they SHALL read this table at dispatch
# time and resolve watchstations via watchstation_bindings.toml.
#
# Trigger taxonomy (mapped to Gas City v1.0.0 order triggers per
# doctrine/AMENDMENTS.md A0001):
#   alarm     -> Gas City "event"   (with `on = "<event-name>"`)
#   scheduled -> Gas City "cron"    (configured in schedule.toml)
#   command   -> Gas City "manual"
#   order     -> not an order at all; encoded as a step inside another
#               formula (see formulas/CATALOG.md)
#
# Severity ladder (casualty-class only):
#   low      — XO handles, CO informed only, BoI optional
#   medium   — XO leads, CO informed, BoI COB's call
#   high     — CO awakened, CSO+CHENG involved, BoI mandatory
#   critical — CO awakened, two-key launch required, external BoI chair if
#              Wasteland configured
#
# Required-vs-optional watchstation flags live in watchstation_bindings.toml,
# not here.

# ---------------------------------------------------------------------------
# Routine evolutions
# ---------------------------------------------------------------------------

[[evolution]]
id = "morning_quarters"
trigger = "scheduled"
oic = "xo"
watchstations = ["xo", "ood", "ops", "cso", "cheng", "suppo", "yeoman"]
formula = "packs/bluewater-ops/formulas/morning_quarters.toml"
description = "Daily ops brief; XO presents Plan of the Day to department heads."

[[evolution]]
id = "watch_turnover"
trigger = "scheduled"   # actually context-pressure; see watch_bill.toml
oic = "ood"
watchstations = ["ood", "yeoman"]
formula = "packs/bluewater-ops/formulas/watch_turnover.toml"
description = "Formal handoff between OOD watches."

[[evolution]]
id = "plan_of_the_day"
trigger = "scheduled"
oic = "qm"
watchstations = ["qm", "xo", "yeoman"]
formula = "packs/bluewater-ops/formulas/plan_of_the_day.toml"
description = "Overnight plan generation by Quartermaster."

[[evolution]]
id = "eight_o_clock_reports"
trigger = "scheduled"
oic = "xo"
watchstations = ["xo", "ops", "cso", "cheng", "suppo", "yeoman"]
formula = "packs/bluewater-ops/formulas/eight_o_clock_reports.toml"
description = "Department status roll-up to XO."

[[evolution]]
id = "liberty_call"
trigger = "scheduled"
oic = "co"
watchstations = ["co", "xo", "ood"]
formula = "formulas/liberty_call.toml"
description = "Designated rest period; risky evolutions paused."

[[evolution]]
id = "field_day"
trigger = "scheduled"
oic = "cob"
watchstations = ["cob", "cheng", { rating = "et", count = { min = 1, max = 4 } }]
formula = "packs/bluewater-eng/formulas/field_day.toml"
description = "Tech-debt and runtime-hygiene cleanup convoy."

# ---------------------------------------------------------------------------
# Operational evolutions
# ---------------------------------------------------------------------------

[[evolution]]
id = "sea_and_anchor_detail"
trigger = "command"
oic = "xo"
watchstations = ["xo", "ood", "air_boss", "helmsman", { rating = "fc", count = 1 }, { rating = "gm", count = { min = 1, max = 4 } }, "yeoman"]
formula = "packs/bluewater-cs/formulas/sea_and_anchor_detail.toml"
description = "Choreographed deploy. (When bluewater-air present, ownership shifts to Air Boss via packs/bluewater-air/formulas/sea_and_anchor_detail.toml.)"

[[evolution]]
id = "flight_ops"
trigger = "command"
oic = "air_boss"
watchstations = ["air_boss", "yellow", "purple", "red", "green", "brown", "blue", "white", "yeoman"]
formula = "packs/bluewater-air/formulas/flight_ops.toml"
description = "Flight-deck deploy choreography (carrier-class)."

[[evolution]]
id = "unrep"
trigger = "command"
oic = "suppo"
watchstations = ["suppo", { rating = "sk", count = 1 }]
formula = "packs/bluewater-supply/formulas/unrep.toml"
description = "Underway replenishment — refresh external context without stopping work."

[[evolution]]
id = "replenish_credits"
trigger = "alarm"
oic = "suppo"
watchstations = ["suppo", { rating = "sk", count = 1 }]
formula = "packs/bluewater-supply/formulas/replenish_credits.toml"
description = "Provider-credit exhaustion recovery."

[[evolution]]
id = "pr_review"
trigger = "order"   # invoked as step inside other formulas; also bound to pr_opened
oic = "cso"
watchstations = ["cso", { rating = "fc", count = 1 }, { rating = "jag", count = 1, optional = true }]
formula = "packs/bluewater-cs/formulas/pr_review.toml"
description = "Multi-provider code review (Pack v2 review formula)."

