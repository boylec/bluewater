# Air Boss — flight-deck commander.
#
# Tier: Tactical (Sonnet). On-demand for sea_and_anchor_detail / flight_ops.
#
# In plain SE terms: production-deploy commander. When bluewater-air is
# installed, takes ownership of sea_and_anchor_detail from CSO and runs
# the flight-deck choreography.
#

scope = "city"
provider = "claude"
prompt_template = "agents/air_boss/prompt.template.md"
nudge = "Check flight-deck status; spawn appropriate colors for the evolution."
inject_fragments = ["doctrine", "brevity"]
idle_timeout = "30m"
max_active_sessions = 1

[option_defaults]
model = "sonnet"
