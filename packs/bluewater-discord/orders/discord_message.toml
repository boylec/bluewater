# discord_message — fire discord_intake_route on each inbound interaction.
#
# In plain SE terms: fires discord_intake_route on each inbound Discord
# interaction.
#
[order]
description = "Each inbound Discord interaction (slash command, mention, message) fires the routing formula under Quarterdeck Watch."
trigger = "event"
on = "discord.interaction"
formula = "discord_intake_route"
pool = "quarterdeck_watch"
timeout = "30s"
enabled = true
