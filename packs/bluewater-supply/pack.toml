# Bluewater Supply — provider routing and credit/credential brokering.
#
# SUPPO holds refusal authority over provider routing. SUPPO's job is to
# track per-provider credit consumption, route work to whichever provider
# has budget headroom, and own the secret-management pipeline so that no
# other agent ever has direct access to credentials.
#
# Spec: docs/spec/REQUIREMENTS-supply.md

[pack]
name = "bluewater-supply"
version = "0.1.0"
schema = 2
requires_gc = ">= 1.0.0"
description = "Supply department: SUPPO / SK. Provider routing, credit brokering, credential pipeline."

[[named_session]]
template = "suppo"
scope = "city"
mode = "on_demand"
