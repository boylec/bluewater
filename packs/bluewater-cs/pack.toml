# Bluewater Combat Systems — the kill chain.
#
# CSO is the dept head. FC (Fire Controlmen) translate intent into
# bead parameters (targeting). GM (Gunner's Mates) are implementation
# polecats — the ones who actually write the code. DC (Damage
# Controlmen) handle bug-fix and casualty response. Helmsman / BMOW
# lands the merge via the Refinery.
#
# Spec: docs/spec/REQUIREMENTS-cs.md

[pack]
name = "bluewater-cs"
version = "0.1.0"
schema = 2
requires_gc = ">= 1.0.0"
description = "Combat Systems department: CSO / FC / GM / DC / Helmsman. The kill chain — intent → targeting → implementation → merge."

[[named_session]]
template = "cso"
scope = "city"
mode = "on_demand"
