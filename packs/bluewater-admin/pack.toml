# Bluewater Admin — Yeoman / MAA / JAG. Records, security, compliance.
#
# - Yeoman owns the captain's log (durable record of decisions, watch
#   turnovers, board outcomes).
# - MAA is the pre-tool-use guard. Has refusal authority on any tool call
#   that violates the safety provisions in doctrine/DOCTRINE.md.
# - JAG handles license/compliance review when it shows up.
#
# Spec: docs/spec/REQUIREMENTS-admin.md

[pack]
name = "bluewater-admin"
version = "0.1.0"
schema = 2
requires_gc = ">= 1.0.0"
description = "Admin department: Yeoman / MAA / JAG. Records, pre-tool-use security guard, compliance."

[[named_session]]
template = "yeoman"
scope = "city"
mode = "always"

[[named_session]]
template = "maa"
scope = "city"
mode = "always"

[[named_session]]
template = "jag"
scope = "city"
mode = "on_demand"
