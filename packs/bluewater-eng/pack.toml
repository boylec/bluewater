# Bluewater Engineering — runtime infrastructure and token-burn governance.
#
# CHENG (Chief Engineer) holds technical authority over token burn rate the
# same way a real ship's Engineering Officer of the Watch holds authority
# over the reactor. CHENG MAY refuse a Mayor (XO) order to spawn more
# workers if the requested operation would breach the configured burn rate;
# only the CO can override, and the override is logged.
#
# Spec: docs/spec/REQUIREMENTS-eng.md
# Doctrine: ../../doctrine/DOCTRINE.md (Token discipline section)

[pack]
name = "bluewater-eng"
version = "0.1.0"
schema = 2
requires_gc = ">= 1.0.0"
description = "Engineering department: CHENG / EOOW / ET. Token-burn governance, runtime hygiene."

[[named_session]]
template = "cheng"
scope = "city"
mode = "on_demand"

[[named_session]]
template = "eoow"
scope = "city"
mode = "always"
