# Carrier-class Bluewater deployment.
#
# Umbrella plus all three optional sub-packs:
#   bluewater-air     — production deploy choreography
#   bluewater-discord — Discord intake (Quarterdeck Watch)
#   bluewater-slack   — Slack intake (Quarterdeck Watch)
#
# Suitable for: long-running production packs landing convoys daily,
# multi-rig orgs, public-internet-facing deploys, teams with chat-driven
# operations.

[workspace]
name = "carrier"
provider = "claude"
formula_v2 = true

[imports.bluewater]
source = "github.com/boylec/bluewater"

# Optional sub-packs (each imported separately).
[imports.bluewater_air]
source = "github.com/boylec/bluewater/packs/bluewater-air"

[imports.bluewater_discord]
source = "github.com/boylec/bluewater/packs/bluewater-discord"

# Slack alongside Discord — Quarterdeck Watch runs on both; either
# adapter routes to the same watchstander pool. Drop one of the two
# imports if you only use one chat platform.
[imports.bluewater_slack]
source = "github.com/boylec/bluewater/packs/bluewater-slack"

[daemon]
patrol_interval = "30s"
max_restarts = 5
restart_window = "1h"
shutdown_timeout = "5s"

# Three providers strongly recommended for carrier-class so the
# CO/XO/COB three-way provider distribution actually has three providers
# to land on. Flight ops two-key launch always requires cross-provider
# concurrence.
#
# [providers.claude]
# [providers.codex]
# [providers.gemini]

[bluewater.air]
# enable_flight_ops = true   # implicit when bluewater-air is imported

[bluewater.discord]
# Configure the underlying discord-intake service here; see
# gascity-packs/discord-intake/README.md.

[bluewater.slack]
# Configure the underlying slack-intake service here; mirrors
# discord-intake. See packs/bluewater-slack/pack.toml.
