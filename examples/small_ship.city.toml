# Small-ship Bluewater deployment.
#
# The umbrella pack alone gives you a fully functional ship: Wardroom,
# Engineering, Operations, Combat Systems, Supply, Medical, Admin —
# all six required departments inlined. No optional sub-packs.
#
# This example assumes you have at least two of {claude, codex, gemini}
# configured as providers. Two-key launches require cross-provider
# concurrence; single-provider ships degrade those features.

[workspace]
name = "small-ship"
provider = "claude"
formula_v2 = true

[imports.bluewater]
source = "github.com/boylec/bluewater"

[daemon]
patrol_interval = "30s"
max_restarts = 5
restart_window = "1h"
shutdown_timeout = "5s"

# Provider configuration (uncomment and fill in for your environment).
# Two providers minimum recommended for cross-provider concurrence:
#
# [providers.claude]
# (claude config — anthropic API key via env or config)
#
# [providers.codex]
# (codex config)
#
# [providers.gemini]
# (gemini config)
#
# Default per-rating provider mapping (override here if needed):
#   CO  -> claude  XO  -> codex   COB -> gemini
#   OOD -> claude  CSOOW -> codex
#   MA  -> codex   YN  -> claude  JAG -> gemini

# Bluewater-specific overlay (optional). Knobs live under
# [bluewater.<dept>] for clarity.

[bluewater.eng]
# Burn-rate envelope (in tokens). CHENG refuses spawn requests when
# breached. Override defaults here:
# per_hour_cap = 10_000_000
# per_day_cap  = 80_000_000

[bluewater.brevity]
# Promote to "strict" after 30 days. Until then "advisory" is the
# pack default and warnings flow to COB without rejecting messages.
# level = "advisory"

# Crew members (rated agents) are not declared here; they are pack-
# stamped via the rating system in agents/<rate>/. Officers and
# always-on watch standers are declared as [[named_session]] in the
# umbrella's pack.toml.
